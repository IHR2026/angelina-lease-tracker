<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angelina County Oil & Gas Lease Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; }

#app { display: flex; height: 100vh; }

/* Sidebar */
#sidebar {
  width: 380px; min-width: 380px; background: #16213e; display: flex; flex-direction: column;
  border-right: 2px solid #0f3460; overflow: hidden; z-index: 1000;
}
#sidebar.collapsed { width: 0; min-width: 0; }
#sidebar-header {
  padding: 16px 20px; background: #0f3460; border-bottom: 2px solid #e94560;
}
#sidebar-header h1 { font-size: 18px; color: #fff; margin-bottom: 4px; }
#sidebar-header p { font-size: 12px; color: #a0a0c0; }

.sidebar-section { padding: 12px 16px; border-bottom: 1px solid #1a1a3e; }
.sidebar-section h3 { font-size: 13px; color: #e94560; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

/* Search & Filter */
input[type="text"], input[type="date"], select {
  width: 100%; padding: 8px 12px; background: #1a1a2e; border: 1px solid #0f3460;
  color: #e0e0e0; border-radius: 4px; font-size: 13px; margin-bottom: 6px;
}
input:focus, select:focus { outline: none; border-color: #e94560; }

.filter-row { display: flex; gap: 6px; }
.filter-row > * { flex: 1; }

.btn {
  padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: all 0.2s;
}
.btn-primary { background: #e94560; color: #fff; }
.btn-primary:hover { background: #c73652; }
.btn-secondary { background: #0f3460; color: #a0a0c0; }
.btn-secondary:hover { background: #1a4080; color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 11px; }

/* Stats panel */
#stats-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card {
  background: #1a1a2e; border-radius: 6px; padding: 10px; text-align: center;
  border: 1px solid #0f3460;
}
.stat-card .value { font-size: 22px; font-weight: 700; color: #e94560; }
.stat-card .label { font-size: 10px; color: #a0a0c0; text-transform: uppercase; }

/* Legend */
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px; }
.legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; }

/* Lease list */
#lease-list { flex: 1; overflow-y: auto; padding: 8px 16px; }
.lease-item {
  background: #1a1a2e; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
  border-left: 3px solid #e94560; cursor: pointer; transition: all 0.2s;
}
.lease-item:hover { background: #1f2040; transform: translateX(2px); }
.lease-item .grantor { font-weight: 600; font-size: 13px; color: #fff; }
.lease-item .details { font-size: 11px; color: #a0a0c0; margin-top: 2px; }
.lease-item .grantee-tag {
  display: inline-block; background: #0f3460; color: #6db3f2; padding: 1px 8px;
  border-radius: 10px; font-size: 10px; margin-top: 4px;
}

/* Map container */
#map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* Toggle sidebar */
#toggle-sidebar {
  position: absolute; top: 10px; left: 10px; z-index: 1001;
  background: #16213e; color: #e94560; border: 2px solid #e94560;
  padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 16px;
  display: none;
}
#sidebar.collapsed ~ #map-container #toggle-sidebar { display: block; }

/* Map legend overlay */
.map-legend {
  position: absolute; bottom: 30px; right: 10px; z-index: 1000;
  background: rgba(22, 33, 62, 0.95); padding: 12px 16px; border-radius: 8px;
  border: 1px solid #0f3460; font-size: 12px; max-width: 200px;
}
.map-legend h4 { color: #e94560; margin-bottom: 8px; font-size: 12px; }

/* Info panel */
#info-panel {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  background: rgba(22, 33, 62, 0.95); padding: 16px 20px; border-radius: 8px;
  border: 1px solid #e94560; max-width: 360px; display: none;
}
#info-panel h3 { color: #e94560; margin-bottom: 10px; }
#info-panel .close-btn {
  position: absolute; top: 8px; right: 12px; cursor: pointer; color: #a0a0c0;
  font-size: 18px;
}
#info-panel .close-btn:hover { color: #fff; }
.info-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; border-bottom: 1px solid #1a1a3e; }
.info-row .lbl { color: #a0a0c0; }
.info-row .val { color: #fff; font-weight: 500; text-align: right; max-width: 200px; }

/* Parcel toggle */
.layer-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.layer-toggle input[type="checkbox"] { accent-color: #e94560; }

/* Loading */
#loading {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 2000; background: rgba(22,33,62,0.95); padding: 30px 50px;
  border-radius: 12px; text-align: center; border: 1px solid #e94560;
}
#loading .spinner {
  width: 40px; height: 40px; border: 4px solid #0f3460; border-top: 4px solid #e94560;
  border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Leaflet popup custom */
.leaflet-popup-content-wrapper { background: #16213e; color: #e0e0e0; border: 1px solid #e94560; border-radius: 8px; }
.leaflet-popup-tip { background: #16213e; }
.leaflet-popup-content { font-size: 12px; line-height: 1.6; }
.abstract-label { background: transparent !important; border: none !important; box-shadow: none !important; color: #555; font-weight: 700; font-size: 11px; }
.well-tooltip { background: rgba(22,33,62,0.9) !important; color: #ff1744 !important; border: 1px solid #ff1744 !important; font-weight: 700; font-size: 11px; }
.leaflet-popup-content b { color: #e94560; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #e94560; }

/* Responsive */
@media (max-width: 768px) {
  #sidebar { width: 100%; min-width: 100%; max-height: 40vh; }
  #app { flex-direction: column; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Loading lease data...</div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Angelina County O&G Leases</h1>
      <p>Oil & Gas Lease Tracker — East Texas</p>
    </div>

    <div class="sidebar-section">
      <h3>Search & Filter</h3>
      <input type="text" id="search-input" placeholder="Search grantor, grantee, or abstract...">
      <div class="filter-row">
        <select id="filter-grantee">
          <option value="">All Operators</option>
        </select>
      </div>
      <div class="filter-row">
        <input type="date" id="date-from" title="From date">
        <input type="date" id="date-to" title="To date">
      </div>
      <div class="filter-row" style="margin-top:6px;">
        <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
        <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
        <button class="btn btn-secondary" onclick="exportFiltered()">Export CSV</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Map Layers</h3>
      <div class="layer-toggle">
        <input type="checkbox" id="toggle-leases" checked onchange="toggleLeaseLayer()">
        <label for="toggle-leases">Oil & Gas Leases (709)</label>
      </div>
      <div class="layer-toggle">
        <input type="checkbox" id="toggle-parcels" checked onchange="toggleParcelLayer()">
        <label for="toggle-parcels">County Parcels (loading...)</label>
      </div>
      <div class="layer-toggle">
        <input type="checkbox" id="toggle-wells" checked onchange="toggleWellsLayer()">
        <label for="toggle-wells">Wells (loading...)</label>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Statistics</h3>
      <div id="stats-panel">
        <div class="stat-card"><div class="value" id="stat-total">0</div><div class="label">Total Leases</div></div>
        <div class="stat-card"><div class="value" id="stat-visible">0</div><div class="label">Showing</div></div>
        <div class="stat-card"><div class="value" id="stat-acres">0</div><div class="label">Total Acres</div></div>
        <div class="stat-card"><div class="value" id="stat-operators">0</div><div class="label">Operators</div></div>
      </div>
    </div>

    <div class="sidebar-section" style="padding-bottom: 4px;">
      <h3>Legend — Operator Colors</h3>
      <div id="legend-container"></div>
    </div>

    <div style="padding: 8px 16px;">
      <h3 style="font-size:13px; color:#e94560; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">
        Lease List (<span id="list-count">0</span>)
      </h3>
    </div>
    <div id="lease-list"></div>
  </div>

  <div id="map-container">
    <button id="toggle-sidebar" onclick="document.getElementById('sidebar').classList.remove('collapsed'); this.style.display='none';">☰</button>
    <div id="map"></div>

    <div id="info-panel">
      <span class="close-btn" onclick="this.parentElement.style.display='none'">✕</span>
      <h3>Lease Details</h3>
      <div id="info-content"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>

// ANGELINA COUNTY OIL & GAS LEASE TRACKER

// Check CDN dependencies loaded
if (typeof L === 'undefined') {
  document.getElementById('loading').innerHTML = '<div style="color:#e94560;padding:20px;">Error: Leaflet library failed to load. Check your internet connection and refresh.</div>';

  'BP AMERICA': '#00b4d8',
  'CHESAPEAKE': '#06d6a0',
  'GOODRICH': '#ffd166',
  'KODIAK': '#ef476f',
  'SOUTHWESTERN': '#118ab2',
  'EOG': '#8338ec',
  'XTO': '#ff6b35',
  'PEO HAYNESVILLE': '#06ffa5',
  'BLACK STONE': '#fb5607',
  'SILVER CREEK': '#3a86ff',
  'ANADARKO': '#ffbe0b',
};
const DEFAULT_COLOR = '#a0a0c0';

function getOperatorColor(grantee) {
  if (!grantee) return DEFAULT_COLOR;
  const upper = grantee.toUpperCase();
  for (const [key, color] of Object.entries(OPERATOR_COLORS)) {
    if (upper.includes(key)) return color;
  }
  return DEFAULT_COLOR;
}

function getOperatorName(grantee) {
  if (!grantee) return 'Unknown';
  const upper = grantee.toUpperCase();
  for (const key of Object.keys(OPERATOR_COLORS)) {
    if (upper.includes(key)) return key;
  }
  return 'OTHER';
}

// Initialize map
function initMap() {
  map = L.map('map', {
    center: [31.33, -94.58],
    zoom: 11,
    zoomControl: true
  });

  // Custom panes for layer ordering: parcels (default 400) < wells < leases
  map.createPane('wellsPane');
  map.getPane('wellsPane').style.zIndex = 620;
  map.createPane('leasePane');
  map.getPane('leasePane').style.zIndex = 650;

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri',
    maxZoom: 19
  }).addTo(map);

  // Cluster group
  if (L.markerClusterGroup) {
    clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 50,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
      iconCreateFunction: function(cluster) {
        const count = cluster.getChildCount();
        let size = count < 10 ? 'small' : count < 50 ? 'medium' : 'large';
        let px = size === 'small' ? 30 : size === 'medium' ? 40 : 50;
        return L.divIcon({
          html: '<div style="background:rgba(233,69,96,0.8);color:#fff;border-radius:50%;width:'+px+'px;height:'+px+'px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(px < 40 ? 12 : 14)+'px;border:2px solid rgba(255,255,255,0.5);">'+count+'</div>',
          className: '',
          iconSize: [px, px]
        });
      }
    });
  } else {
    clusterGroup = L.layerGroup();
  }

  leaseLayer = L.layerGroup();

  // Parcel layer placeholder
  parcelLayer = null;
}

function loadLeaseData() {
  try {
    const geojson = LEASE_GEOJSON;
    allLeases = geojson.features.map(function(f) {
      var props = {};
      for (var k in f.properties) { props[k] = f.properties[k]; }
      props.lat = f.geometry.coordinates[1];
      props.lng = f.geometry.coordinates[0];
      return props;
    });

    filteredLeases = allLeases.slice();
    populateFilters();
    renderLeases();
    updateStats();
    buildLegend();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<div style="color:#e94560;padding:20px;">Error loading lease data: ' + e.message + '</div>';
    console.error('loadLeaseData error:', e);
  }
}

function populateFilters() {
  const granteeSelect = document.getElementById('filter-grantee');
  const operators = {};
  allLeases.forEach(l => {
    const op = getOperatorName(l.grantee);
    operators[op] = (operators[op] || 0) + 1;
  });
  const sorted = Object.entries(operators).sort((a,b) => b[1] - a[1]);
  sorted.forEach(([op, count]) => {
    const option = document.createElement('option');
    option.value = op;
    option.textContent = `${op} (${count})`;
    granteeSelect.appendChild(option);
  });
}

function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const granteeFilter = document.getElementById('filter-grantee').value;
  const dateFrom = document.getElementById('date-from').value;
  const dateTo = document.getElementById('date-to').value;

  filteredLeases = allLeases.filter(l => {
    if (search) {
      const haystack = `${l.grantor} ${l.grantee} ${l.grantee_alias} ${l.abstract} ${l.record_number}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    if (granteeFilter && getOperatorName(l.grantee) !== granteeFilter) return false;
    if (dateFrom && l.record_date < dateFrom) return false;
    if (dateTo && l.record_date > dateTo) return false;
    return true;
  });

  renderLeases();
  updateStats();
}

function resetFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-grantee').value = '';
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  filteredLeases = [...allLeases];
  renderLeases();
  updateStats();
}

function renderLeases() {
  leaseLayer.clearLayers();

  filteredLeases.forEach(l => {
    const color = getOperatorColor(l.grantee);
    const marker = L.circleMarker([l.lat, l.lng], {
      radius: 7,
      fillColor: color,
      color: '#fff',
      weight: 1.5,
      opacity: 0.9,
      fillOpacity: 0.8,
      pane: 'leasePane'
    });

    marker.bindPopup(`
      <div style="min-width:200px;">
        <b style="font-size:14px;">${l.grantor || 'N/A'}</b><br>
        <b>To:</b> ${l.grantee || 'N/A'}<br>
        <b>Abstract:</b> ${l.abstract || 'N/A'} &nbsp; <b>Acres:</b> ${l.area_acres ? parseFloat(l.area_acres).toFixed(1) : 'N/A'}<br>
        <b>Record Date:</b> ${l.record_date || 'N/A'}<br>
        <b>Effective:</b> ${l.effective_date || 'N/A'}<br>
        <b>Term:</b> ${l.term_months || 'N/A'} months<br>
        <b>Type:</b> ${l.instrument_type || 'N/A'}<br>
        <b>Play:</b> ${l.di_play || 'N/A'}<br>
        <b>Record #:</b> ${l.record_number || 'N/A'}
      </div>
    `);

    marker.on('click', () => showInfoPanel(l));
    leaseLayer.addLayer(marker);
  });

  map.addLayer(leaseLayer);

  // Lease list
  const listEl = document.getElementById('lease-list');
  const listCountEl = document.getElementById('list-count');
  listCountEl.textContent = filteredLeases.length;

  // Only render first 200 in list for performance
  const showLeases = filteredLeases.slice(0, 200);
  listEl.innerHTML = showLeases.map((l, i) => `
    <div class="lease-item" onclick="flyToLease(${i})">
      <div class="grantor">${l.grantor || 'Unknown Grantor'}</div>
      <div class="details">Abs: ${l.abstract} | ${l.area_acres ? parseFloat(l.area_acres).toFixed(1) : '?'} ac | ${l.record_date || 'N/A'}</div>
      <span class="grantee-tag">${l.grantee_alias || l.grantee || 'N/A'}</span>
    </div>
  `).join('');
}

function flyToLease(index) {
  const l = filteredLeases[index];
  map.flyTo([l.lat, l.lng], 15, { duration: 0.8 });
  showInfoPanel(l);
}

function showInfoPanel(l) {
  const panel = document.getElementById('info-panel');
  const content = document.getElementById('info-content');
  const rows = [
    ['Grantor', l.grantor],
    ['Grantee', l.grantee],
    ['Alias', l.grantee_alias],
    ['Abstract', l.abstract],
    ['Acres', l.area_acres ? parseFloat(l.area_acres).toFixed(2) : 'N/A'],
    ['Record #', l.record_number],
    ['Instrument', l.instrument_type],
    ['Record Date', l.record_date],
    ['Effective', l.effective_date],
    ['Term', l.term_months ? `${l.term_months} mo` : 'N/A'],
    ['Basin', l.di_basin],
    ['Play', l.di_play],
    ['Subplay', l.di_subplay],
    ['Bonus', l.bonus || 'N/A'],
    ['Royalty', l.royalty || 'N/A'],
    ['Assignee', l.majority_legal_assignee || 'N/A'],
    ['Lat/Lng', `${l.lat}, ${l.lng}`],
  ];
  content.innerHTML = rows.map(([lbl, val]) =>
    `<div class="info-row"><span class="lbl">${lbl}</span><span class="val">${val || 'N/A'}</span></div>`
  ).join('');
  panel.style.display = 'block';
}

function updateStats() {
  document.getElementById('stat-total').textContent = allLeases.length;
  document.getElementById('stat-visible').textContent = filteredLeases.length;
  const totalAcres = filteredLeases.reduce((sum, l) => sum + (parseFloat(l.area_acres) || 0), 0);
  document.getElementById('stat-acres').textContent = totalAcres > 1000
    ? (totalAcres / 1000).toFixed(1) + 'K'
    : Math.round(totalAcres);
  const uniqueOps = new Set(filteredLeases.map(l => getOperatorName(l.grantee)));
  document.getElementById('stat-operators').textContent = uniqueOps.size;
}

function buildLegend() {
  const container = document.getElementById('legend-container');
  const opCounts = {};
  allLeases.forEach(l => {
    const op = getOperatorName(l.grantee);
    opCounts[op] = (opCounts[op] || 0) + 1;
  });
  const sorted = Object.entries(opCounts).sort((a,b) => b[1] - a[1]).slice(0, 12);
  container.innerHTML = sorted.map(([op, count]) => {
    const color = OPERATOR_COLORS[op] || DEFAULT_COLOR;
    return `<div class="legend-item"><span class="legend-dot" style="background:${color};"></span>${op} (${count})</div>`;
  }).join('');
}

function toggleLeaseLayer() {
  const checked = document.getElementById('toggle-leases').checked;
  if (checked) {
    map.addLayer(leaseLayer);
  } else {
    if (map.hasLayer(leaseLayer)) map.removeLayer(leaseLayer);
  }
}

var abstractLayer = null;
var selectedParcel = null;
var defaultParcelStyle = { color: '#e94560', weight: 1, opacity: 0.6, fillColor: '#e94560', fillOpacity: 0.05 };
var highlightParcelStyle = { color: '#00e5ff', weight: 3, opacity: 1, fillColor: '#00e5ff', fillOpacity: 0.3 };

function toggleParcelLayer() {
  if (!parcelsLoaded) { loadParcelLayer(); return; }
  var checked = document.getElementById('toggle-parcels').checked;
  var z = map.getZoom();
  if (checked) {
    if (abstractLayer && z >= 12) map.addLayer(abstractLayer);
    if (parcelLayer && z >= 14) map.addLayer(parcelLayer);
  } else {
    if (parcelLayer && map.hasLayer(parcelLayer)) map.removeLayer(parcelLayer);
    if (abstractLayer && map.hasLayer(abstractLayer)) map.removeLayer(abstractLayer);
  }
}

function fetchParcelsFromService() {
  // Download parcels from Angelina CAD ArcGIS FeatureServer in batches
  var baseUrl = 'https://utility.arcgis.com/usrsvcs/servers/0d57665b0361492397b48cbd4ad88ad6/rest/services/AngelinaCADWebService/FeatureServer';
  var fields = 'prop_id,file_as_name,legal_acreage,legal_desc,abs_subdv_cd,land_val,market,situs_street,situs_city,geo_id,Deed_Date';
  var batchSize = 2000;

  return fetch(baseUrl + '/0/query?where=1%3D1&returnCountOnly=true&f=json')
    .then(function(r) { return r.json(); })
    .then(function(countData) {
      var total = countData.count;
      var label = document.getElementById('toggle-parcels').nextElementSibling;
      var allFeatures = [];

      function fetchBatch(offset) {
        if (offset >= total) {
          return { type: 'FeatureCollection', features: allFeatures };
        }
        var url = baseUrl + '/0/query?where=1%3D1&outFields=' + fields + '&outSR=4326&f=geojson&resultRecordCount=' + batchSize + '&resultOffset=' + offset;
        return fetch(url)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.features) allFeatures = allFeatures.concat(data.features);
            var pct = Math.min(100, Math.floor(allFeatures.length / total * 100));
            label.textContent = 'Loading parcels... ' + pct + '%';
            return fetchBatch(offset + batchSize);
          });
      }

      return fetchBatch(0);
    });
}

function loadParcelLayer() {
  var label = document.getElementById('toggle-parcels').nextElementSibling;
  label.textContent = 'Loading parcels...';

  // Load parcels from split files (or single file), with live service fallback
  var parcelPromise = fetch('angelina_parcels.geojson').then(function(r) {
    if (!r.ok) throw new Error('single file not found');
    return r.json();
  }).catch(function() {
    // Try loading split parts
    label.textContent = 'Loading parcels (parts)...';
    return Promise.all([
      fetch('parcels_p0.geojson').then(function(r) { return r.ok ? r.json() : null; }),
      fetch('parcels_p1.geojson').then(function(r) { return r.ok ? r.json() : null; }),
      fetch('parcels_p2.geojson').then(function(r) { return r.ok ? r.json() : null; }),
      fetch('parcels_p3.geojson').then(function(r) { return r.ok ? r.json() : null; })
    ]).then(function(parts) {
      var allFeatures = [];
      parts.forEach(function(p) { if (p && p.features) allFeatures = allFeatures.concat(p.features); });
      if (allFeatures.length === 0) throw new Error('no parts found');
      return { type: 'FeatureCollection', features: allFeatures };
    });
  }).catch(function() {
    label.textContent = 'Downloading parcels from county...';
    return fetchParcelsFromService();
  });

  Promise.all([
    parcelPromise,
    fetch('angelina_abstracts.geojson').then(function(r) {
      if (!r.ok) throw new Error('abstracts not found');
      return r.json();
    })
  ]).then(function(results) {
    var parcelData = results[0];
    var abstractData = results[1];

    // Abstract boundaries — thicker dark lines with labels
    abstractLayer = L.geoJSON(abstractData, {
      style: function() {
        return { color: '#333', weight: 2.5, opacity: 0.7, fillColor: 'transparent', fillOpacity: 0 };
      },
      onEachFeature: function(feature, layer) {
        var p = feature.properties;
        layer.bindTooltip('A-' + (p.CODE || ''), { permanent: true, direction: 'center', className: 'abstract-label' });
        layer.bindPopup(
          '<div style="min-width:180px;">' +
          '<b style="color:#ffd166;">Abstract Info</b><br>' +
          '<b>Abstract:</b> A-' + (p.CODE || 'N/A') + '<br>' +
          '<b>Survey:</b> ' + (p.Surv_Name || 'N/A') + '<br>' +
          '<b>Section:</b> ' + (p.Surv_Sect || 'N/A') + '<br>' +
          '<b>Block:</b> ' + (p.Block || 'N/A') + '<br>' +
          '<b>Description:</b> ' + (p.DESC_ || 'N/A') +
          '</div>'
        );
      },
      minZoom: 11
    });

    // Build lease-to-abstract lookup: abstract number → lease info (most recent)
    var leaseByAbstract = {};
    allLeases.forEach(function(l) {
      var absNum = String(l.abstract);
      leaseByAbstract[absNum] = l;
    });

    // Parcel boundaries — color-filled if leased, plain if not
    parcelLayer = L.geoJSON(parcelData, {
      style: function(feature) {
        var absCode = String(feature.properties.abs_subdv_cd || '').replace(/^0+/, '');
        var lease = leaseByAbstract[absCode];
        if (lease) {
          var color = getOperatorColor(lease.grantee);
          return { color: color, weight: 1.5, opacity: 0.8, fillColor: color, fillOpacity: 0.25 };
        }
        return defaultParcelStyle;
      },
      onEachFeature: function(feature, layer) {
        var p = feature.properties;
        var absCode = String(p.abs_subdv_cd || '').replace(/^0+/, '');
        var lease = leaseByAbstract[absCode];
        var acres = p.legal_acreage ? parseFloat(p.legal_acreage).toFixed(2) : 'N/A';
        var addr = p.situs_street ? (p.situs_street + (p.situs_city ? ', ' + p.situs_city : '')) : 'N/A';

        var leaseInfo = '';
        if (lease) {
          leaseInfo =
            '<hr style="border-color:#333;margin:6px 0;">' +
            '<b style="color:#e94560;">Active Lease</b><br>' +
            '<b>Operator:</b> ' + (lease.grantee || 'N/A') + '<br>' +
            '<b>Grantor:</b> ' + (lease.grantor || 'N/A') + '<br>' +
            '<b>Effective:</b> ' + (lease.effective_date || 'N/A') + '<br>' +
            '<b>Term:</b> ' + (lease.term_months ? lease.term_months + ' mo' : 'N/A') + '<br>' +
            '<b>Lease Acres:</b> ' + (lease.area_acres ? parseFloat(lease.area_acres).toFixed(1) : 'N/A');
        }

        layer.bindPopup(
          '<div style="min-width:220px;">' +
          '<b style="color:#3a86ff;">Parcel Info</b><br>' +
          '<b>Owner:</b> ' + (p.file_as_name || 'N/A') + '<br>' +
          '<b>Address:</b> ' + addr + '<br>' +
          '<b>Acres:</b> ' + acres + '<br>' +
          '<b>Legal:</b> ' + (p.legal_desc || 'N/A') + '<br>' +
          '<b>Abstract:</b> ' + (p.abs_subdv_cd || 'N/A') + '<br>' +
          '<b>Mkt Value:</b> ' + (p.market ? '$' + Number(p.market).toLocaleString() : 'N/A') + '<br>' +
          '<b>Land Value:</b> ' + (p.land_val ? '$' + Number(p.land_val).toLocaleString() : 'N/A') + '<br>' +
          '<b>Prop ID:</b> ' + (p.prop_id || 'N/A') + '<br>' +
          '<b>Geo ID:</b> ' + (p.geo_id || 'N/A') + '<br>' +
          '<b>Deed Date:</b> ' + (p.Deed_Date || 'N/A') +
          leaseInfo +
          '</div>'
        );

        // Store the base style for highlight restore
        var baseStyle;
        if (lease) {
          var color = getOperatorColor(lease.grantee);
          baseStyle = { color: color, weight: 1.5, opacity: 0.8, fillColor: color, fillOpacity: 0.25 };
        } else {
          baseStyle = defaultParcelStyle;
        }
        layer._baseStyle = baseStyle;

        layer.on('click', function() {
          if (selectedParcel && selectedParcel._baseStyle) selectedParcel.setStyle(selectedParcel._baseStyle);
          layer.setStyle(highlightParcelStyle);
          layer.bringToFront();
          selectedParcel = layer;
        });
      },
      minZoom: 13
    });

    // Clear highlight when popup closes — restore base style
    map.on('popupclose', function() {
      if (selectedParcel && selectedParcel._baseStyle) {
        selectedParcel.setStyle(selectedParcel._baseStyle);
        selectedParcel = null;
      }
    });

    // Don't add to map yet — zoom handler controls visibility
    parcelsLoaded = true;
    label.textContent = 'County Parcels (' + parcelData.features.length.toLocaleString() + ')';

    // Show/hide layers based on zoom level
    function updateParcelVisibility() {
      var z = map.getZoom();
      var checked = document.getElementById('toggle-parcels').checked;
      // Abstracts show at zoom 12+
      if (checked && z >= 12 && !map.hasLayer(abstractLayer)) map.addLayer(abstractLayer);
      if ((!checked || z < 12) && map.hasLayer(abstractLayer)) map.removeLayer(abstractLayer);
      // Parcels show at zoom 14+
      if (checked && z >= 14 && !map.hasLayer(parcelLayer)) map.addLayer(parcelLayer);
      if ((!checked || z < 14) && map.hasLayer(parcelLayer)) map.removeLayer(parcelLayer);
    }
    map.on('zoomend', updateParcelVisibility);
    updateParcelVisibility();

  }).catch(function(err) {
    console.error('Error loading parcel data:', err);
    label.textContent = 'Parcels (error)';
    alert('Could not load parcel data: ' + err.message + '\n\nMake sure you have run: python download_data.py');
  });
}


// =====================================================
// WELLS LAYER
// =====================================================

var WELL_STATUS_COLORS = {
  'ACTIVE': '#ff1744',
  'SHUT-IN': '#ff9100',
  'INACTIVE': '#ffd600',
  'DUC': '#e040fb',
  'DRILLED': '#aa00ff',
  'P & A': '#757575'
};

function getWellStatusColor(status) {
  return WELL_STATUS_COLORS[status] || '#ff1744';
}

function loadWellsLayer() {
  fetch('angelina_wells.geojson')
    .then(function(r) {
      if (!r.ok) throw new Error('angelina_wells.geojson not found');
      return r.json();
    })
    .then(function(data) {
      wellsLayer = L.layerGroup();

      data.features.forEach(function(feat) {
        var p = feat.properties;
        var coords = feat.geometry.coordinates;
        var slng = coords[0][0], slat = coords[0][1];
        var blng = coords[1][0], blat = coords[1][1];
        var statusColor = getWellStatusColor(p.status);

        var popupHtml =
          '<div style="min-width:240px;">' +
          '<b style="color:#ff1744;font-size:14px;">' + (p.well_name || 'N/A') + ' #' + (p.well_num || '') + '</b><br>' +
          '<b>API:</b> ' + (p.api || 'N/A') + '<br>' +
          '<b>Operator:</b> ' + (p.operator || p.operator_co || 'N/A') + '<br>' +
          '<b>Status:</b> <span style="color:' + statusColor + ';font-weight:700;">' + (p.status || 'N/A') + '</span><br>' +
          '<b>Type:</b> ' + (p.drill_type === 'H' ? 'Horizontal' : p.drill_type || 'N/A') + '<br>' +
          '<b>Target:</b> ' + (p.target_fm || 'N/A') + '<br>' +
          '<b>Prod Type:</b> ' + (p.prod_type || 'N/A') + '<br>' +
          '<b>MD:</b> ' + (p.md ? Number(p.md).toLocaleString() + ' ft' : 'N/A') + '<br>' +
          '<b>TVD:</b> ' + (p.tvd ? Number(p.tvd).toLocaleString() + ' ft' : 'N/A') + '<br>' +
          '<b>Lateral:</b> ' + (p.hz_length ? Number(p.hz_length).toLocaleString() + ' ft' : 'N/A') + '<br>' +
          '<b>Spud:</b> ' + (p.spud_date || 'N/A') + '<br>' +
          '<b>Completion:</b> ' + (p.completion_date || 'N/A') + '<br>' +
          '<b>First Prod:</b> ' + (p.first_prod || 'N/A') + '<br>' +
          (p.cum_gas ? '<b>Cum Gas:</b> ' + Number(p.cum_gas).toLocaleString() + ' MCF<br>' : '') +
          (p.cum_oil ? '<b>Cum Oil:</b> ' + Number(p.cum_oil).toLocaleString() + ' BBL<br>' : '') +
          (p.peak_gas ? '<b>Peak Gas:</b> ' + Number(p.peak_gas).toLocaleString() + ' MCF<br>' : '') +
          (p.peak_boe ? '<b>Peak BOE:</b> ' + Number(p.peak_boe).toLocaleString() + '<br>' : '') +
          '<b>Abstract:</b> ' + (p.abstract || 'N/A') + '<br>' +
          '<b>Survey:</b> ' + (p.survey || 'N/A') +
          '</div>';

        // Lateral line: surface to bottom hole
        var lateral = L.polyline([[slat, slng], [blat, blng]], {
          color: statusColor,
          weight: 4,
          opacity: 0.9,
          dashArray: null,
          pane: 'wellsPane'
        });
        lateral.bindPopup(popupHtml);

        // Surface hole marker (circle)
        var surfaceMarker = L.circleMarker([slat, slng], {
          radius: 5,
          fillColor: '#fff',
          color: statusColor,
          weight: 2.5,
          fillOpacity: 1,
          pane: 'wellsPane'
        });
        surfaceMarker.bindPopup(popupHtml);
        surfaceMarker.bindTooltip(p.well_name || '', { direction: 'top', offset: [0, -8], className: 'well-tooltip' });

        // Bottom hole marker (triangle-ish diamond)
        var bhMarker = L.circleMarker([blat, blng], {
          radius: 3,
          fillColor: statusColor,
          color: statusColor,
          weight: 1,
          fillOpacity: 1,
          pane: 'wellsPane'
        });
        bhMarker.bindPopup(popupHtml);

        wellsLayer.addLayer(lateral);
        wellsLayer.addLayer(surfaceMarker);
        wellsLayer.addLayer(bhMarker);
      });

      wellsLayer.addTo(map);
      document.getElementById('toggle-wells').nextElementSibling.textContent = 'Wells (' + data.features.length + ')';
    })
    .catch(function(err) {
      console.error('Wells load error:', err);
      document.getElementById('toggle-wells').nextElementSibling.textContent = 'Wells (error)';
    });
}

function toggleWellsLayer() {
  var checked = document.getElementById('toggle-wells').checked;
  if (checked && wellsLayer) map.addLayer(wellsLayer);
  else if (wellsLayer && map.hasLayer(wellsLayer)) map.removeLayer(wellsLayer);
}

function exportFiltered() {
  const headers = ['Abstract','Latitude','Longitude','Grantor','Grantee','Record_Date','Effective_Date','Acres','Term_Months','Instrument_Type','Record_Number','DI_Play'];
  const rows = filteredLeases.map(l => [
    l.abstract, l.lat, l.lng, `"${(l.grantor||'').replace(/"/g,'""')}"`,
    `"${(l.grantee||'').replace(/"/g,'""')}"`, l.record_date, l.effective_date,
    l.area_acres, l.term_months, `"${l.instrument_type||''}"`, l.record_number, `"${l.di_play||''}"`
  ].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'angelina_leases_filtered.csv';
  a.click();
}

// Initialize with error handling
try {
  initMap();
  loadLeaseData();
  loadParcelLayer();
  loadWellsLayer();
} catch(e) {
  document.getElementById('loading').innerHTML =
    '<div style="color:#e94560;padding:20px;">Error: ' + e.message + '<br><br>Stack: ' + e.stack + '</div>';
  console.error('Init error:', e);
}
